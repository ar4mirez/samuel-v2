# golangci-lint v2 config — restores the lint surface this repo ran on
# under v1.x before the Go 1.25 / sigstore-go bump in PRD 0008.
#
# v2 ships stricter defaults than v1 in two areas that fire across the
# codebase but are out of scope for PRD 0008:
#
#   - errcheck on fmt.Fprint*/Close — v1 ignored these by convention;
#     v2 requires explicit handling. The fmt.Fprint* sites are CLI
#     output where the failure mode is fatal-by-OS anyway; the Close
#     sites are deferred cleanup.
#   - staticcheck QF (quick-fix) and a few ST (style) checks — these
#     are stylistic improvements (De Morgan, Fprintf vs WriteString,
#     omit-type declarations) that pre-date this PR and live in
#     untouched files.
#
# When the codebase is ready to adopt v2's stricter defaults, replace
# this file with the linter list you want and migrate the issues in
# their own PR.

version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      # Functions whose returned error is conventionally ignored at
      # the call site (CLI output + cleanup). Wazero Close(ctx) takes
      # a context.Context arg so it doesn't satisfy io.Closer and
      # needs explicit listing.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - (io.Closer).Close
        - (*os.File).Close
        - (*bytes.Buffer).WriteString
        - (*strings.Builder).WriteString
        - (github.com/tetratelabs/wazero.Runtime).Close
        - (github.com/tetratelabs/wazero.CompiledModule).Close
        - (github.com/tetratelabs/wazero/api.Module).Close
        - (github.com/tetratelabs/wazero/api.Closer).Close
    staticcheck:
      checks:
        - all
        # QF1xxx — quick-fix / style suggestions. Not bug indicators.
        - -QF1001
        - -QF1003
        - -QF1008
        - -QF1011
        - -QF1012
        # ST1xxx — style-tier checks (comment form, receiver names,
        # omit type). Pre-existing in untouched files.
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1023

  # Fallback message-pattern exclusions for cases where errcheck's
  # function-qualifier matcher does not bind (e.g. wazero.Runtime is
  # an interface defined in a non-stdlib package; some v2 builds of
  # errcheck do not match these through settings.errcheck.exclude-
  # functions). The patterns below scope to deferred cleanup calls
  # (Close, Remove) where the return value is conventionally ignored.
  exclusions:
    rules:
      - linters: [errcheck]
        text: 'Error return value of `.*\.Close.*` is not checked'
      - linters: [errcheck]
        text: 'Error return value of `os\.Remove(All)?` is not checked'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
